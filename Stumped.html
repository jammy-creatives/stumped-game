<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stumped! - JammyCreatives</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('Assets/GameBackground.png') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: -webkit-fill-available; /* Fixed iOS safari viewport scale */
            user-select: none;
            box-sizing: border-box;
            overflow: hidden;
        }
        
        #game-box {
            width: 100%;
            max-width: 420px; 
            height: 96vh; /* Lock bounds container to viewport space safely */
            max-height: 760px;
            background-color: #9876e0; 
            border: 5px solid #ffffff;
            border-radius: 24px;
            padding: 12px; 
            box-sizing: border-box; 
            text-align: center;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Dynamically balance empty space allocation */
            align-items: center;
        }

        /* Interactive Action Icons (Cog & Info) */
        #settings-cog {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 26px;
            height: 26px;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        #settings-cog:hover {
            transform: rotate(45deg);
        }

        #info-icon {
            position: absolute;
            top: 46px; 
            right: 12px;
            width: 26px;
            height: 26px;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.2s ease;
        }
        #info-icon:hover {
            transform: scale(1.1);
        }

        /* Full-screen Responsive How-To-Play Modal Overlay */
        #info-panel {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); 
            border-radius: 20px;
            z-index: 120;
            box-sizing: border-box;
            padding: 15px;
            justify-content: center;
            align-items: center;
        }
        .info-content-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        #info-guide-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
            border: 3px solid #ffffff;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .close-x-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 38px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            z-index: 130;
            line-height: 1;
        }

        /* Settings Overlay Panel */
        #settings-panel {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(152, 118, 224, 0.98);
            border-radius: 20px;
            z-index: 90;
            box-sizing: border-box;
            padding: 20px;
            flex-direction: column;
            overflow-y: auto;
        }
        #settings-panel h2 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 20px;
            letter-spacing: 1px;
        }
        .setting-section-title {
            font-size: 11px;
            font-weight: 900;
            color: #ffffff;
            background: #a488e5;
            padding: 4px 8px;
            border-radius: 6px;
            text-align: left;
            margin-bottom: 8px;
            border-left: 3px solid #ffffff;
        }
        .setting-row {
            margin-bottom: 10px;
            text-align: left;
            box-sizing: border-box;
        }
        .setting-row label {
            display: block;
            font-weight: bold;
            font-size: 11px;
            margin-bottom: 4px;
            color: #e3dcf9;
        }
        .setting-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .setting-slider {
            flex-grow: 1;
            accent-color: #ffffff;
            cursor: pointer;
        }
        .setting-value {
            font-weight: 800;
            width: 45px;
            text-align: right;
        }

        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 10px;
        }
        .category-btn {
            background-color: #ffffff;
            color: #9876e0;
            font-size: 11px;
            font-weight: 800;
            padding: 8px 2px;
            border-radius: 8px;
            box-shadow: 0 3px 0 #a488e5;
            border: none;
            cursor: pointer;
        }
        .category-btn.active-selection {
            background-color: #e3dcf9;
            border: 2px solid #ffffff;
            box-shadow: none;
        }
        .category-btn.random-btn {
            grid-column: span 2;
            background-color: #e3dcf9;
            font-size: 12px;
        }
        .close-settings-btn {
            margin-top: auto;
            background: #ffffff;
            color: #9876e0;
            padding: 10px;
        }

        /* Fluid Branding Footprints */
        .game-logo {
            max-width: 240px; 
            width: 70%;
            height: auto;
            margin: 0 auto;
            display: block;
        }
        .company-logo {
            max-width: 180px; 
            width: 50%;
            height: auto;
            margin: 0 auto;
            display: block;
            border-radius: 4px;
        }

        /* Name Input Configuration Matrix */
        #name-setup {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        .name-input {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed #ffffff;
            border-radius: 8px;
            padding: 8px 5px;
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .name-input::placeholder {
            color: #e3dcf9;
            opacity: 0.8;
        }
        .name-input:focus {
            background: #ffffff;
            color: #9876e0;
            border-style: solid;
        }
        
        #scoreboard {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #a488e5;
            padding: 10px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 14px;
            border: 2px solid #ffffff;
            width: 100%;
            box-sizing: border-box;
        }
        .p1-color { color: #ffffff; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 45%; }
        .p2-color { color: #e3dcf9; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 45%; }

        #pool-status-bar {
            display: flex;
            justify-content: center;
        }
        #active-pool-indicator {
            font-size: 11px;
            font-weight: bold;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.25);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        #card {
            background-color: #ffffff;
            color: #9876e0;
            height: 18vh;
            min-height: 90px; 
            max-height: 140px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            padding: 12px;
            box-shadow: 0 6px 0 #a488e5;
            box-sizing: border-box;
            border: 1px solid #e3dcf9;
            line-height: 1.3;
            width: 100%;
        }

        #timer-container {
            width: 100%;
            background-color: #a488e5;
            height: 12px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #ffffff;
            box-sizing: border-box;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            transition: width 0.1s linear;
        }
        #timer-text {
            font-size: 22px;
            font-weight: 900;
            color: #ffffff;
            margin: 2px 0;
        }
        
        #turn-indicator {
            font-size: 16px;
            font-weight: bold;
            height: 20px;
            color: #ffffff;
        }
        
        .btn {
            background-color: #ffffff;
            color: #9876e0;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 800;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 5px 0 #a488e5;
        }
        .btn:active { 
            transform: translateY(3px); 
            box-shadow: 0 2px 0 #a488e5;
        }
        #start-btn {
            background-color: #ffffff;
            color: #9876e0;
            font-size: 17px;
            border: 2px solid #ffffff;
        }
        
        .game-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            box-sizing: border-box;
        }
        .player-btn {
            height: 65px; 
            font-size: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            box-sizing: border-box;
        }
        .player-btn span {
            font-size: 11px;
            opacity: 0.9;
            margin-top: 4px;
        }
        
        #p1-btn { background-color: #ffffff; color: #9876e0; box-shadow: 0 5px 0 #a488e5;}
        #p2-btn { background-color: #e3dcf9; color: #9876e0; box-shadow: 0 5px 0 #a488e5;}
        
        .btn-flash-white {
            background-color: #ffffff !important;
            box-shadow: 0 0 25px #ffffff, 0 5px 0 #a488e5 !important;
        }
        .btn-flash-purple {
            background-color: #a488e5 !important;
            color: #ffffff !important;
            box-shadow: 0 0 25px #a488e5, 0 5px 0 #ffffff !important;
        }
        .player-btn:disabled, #start-btn:disabled {
            background-color: #a488e5 !important;
            color: #e3dcf9 !important;
            cursor: not-allowed;
            opacity: 0.4;
            box-shadow: none !important;
        }

        /* Short Screen Compression System */
        @media (max-height: 680px) {
            #game-box { padding: 8px; }
            .game-logo { max-width: 200px; }
            #card { font-size: 16px; height: 15vh; }
            .player-btn { height: 55px; font-size: 13px; }
            .company-logo { max-width: 150px; }
            #timer-text { font-size: 18px; }
        }
    </style>
</head>
<body>

<div id="game-box">
    <img id="settings-cog" src="Assets/settings.png" alt="Settings" onclick="toggleSettingsPanel(true)">
    <img id="info-icon" src="Assets/info.png" alt="How to Play Guide" onclick="toggleInfoPanel(true)">

    <div id="info-panel">
        <div class="info-content-wrapper">
            <span class="close-x-btn" onclick="toggleInfoPanel(false)">&times;</span>
            <img id="info-guide-img" src="Assets/FRONT.jpg" alt="How to Play Instructions">
        </div>
    </div>

    <div id="settings-panel">
        <h2>GAME SETTINGS</h2>
        
        <div class="setting-section-title">AUDIO CONFIGURATION</div>
        <div class="setting-row">
            <label for="music-volume">MUSIC VOLUME</label>
            <div class="setting-control">
                <input type="range" id="music-volume" class="setting-slider" min="0" max="100" value="10" oninput="applyAudioSettings()">
                <span id="music-vol-val" class="setting-value">10%</span>
            </div>
        </div>

        <div class="setting-row">
            <label for="sfx-volume">SOUND EFFECTS VOLUME</label>
            <div class="setting-control">
                <input type="range" id="sfx-volume" class="setting-slider" min="0" max="100" value="50" oninput="applyAudioSettings()">
                <span id="sfx-vol-val" class="setting-value">50%</span>
            </div>
        </div>

        <div class="setting-section-title">MATCH RULES</div>
        <div class="setting-row">
            <label for="timer-length">ROUND TIMER DURATION</label>
            <div class="setting-control">
                <input type="range" id="timer-length" class="setting-slider" min="5" max="60" value="20" oninput="updateTimerSettingDisplay()">
                <span id="timer-len-val" class="setting-value">20s</span>
            </div>
        </div>

        <div class="setting-section-title">CHOOSE CATEGORY</div>
        <div class="category-grid">
            <button id="cat-popCulture" class="category-btn" onclick="selectCategory('popCulture')">🎭 Pop-Culture</button>
            <button id="cat-advertising" class="category-btn" onclick="selectCategory('advertising')">📢 Advertising</button>
            <button id="cat-brands" class="category-btn" onclick="selectCategory('brands')">🏷️ Brands</button>
            <button id="cat-music" class="category-btn" onclick="selectCategory('music')">🎵 Music</button>
            <button id="cat-animals" class="category-btn" onclick="selectCategory('animals')">🦁 Animals</button>
            <button id="cat-geography" class="category-btn" onclick="selectCategory('geography')">🌍 Geography</button>
            <button id="cat-videoGames" class="category-btn" onclick="selectCategory('videoGames')">🎮 Video Games</button>
            <button id="cat-sports" class="category-btn" onclick="selectCategory('sports')">⚽ Sports</button>
            <button id="cat-technology" class="category-btn" onclick="selectCategory('technology')">💻 Technology</button>
            <button id="cat-foodDrink" class="category-btn" onclick="selectCategory('foodDrink')">🍕 Food & Drink</button>
            <button id="cat-random" class="category-btn random-btn" onclick="selectCategory('random')">🃏 RANDOM (1000+ Options)</button>
        </div>

        <button class="btn close-settings-btn" onclick="toggleSettingsPanel(false)">SAVE & CLOSE</button>
    </div>

    <img class="game-logo" src="Assets/StumpedLogo.png" alt="Stumped Logo">

    <div id="name-setup">
        <input type="text" id="p1-name-input" class="name-input" placeholder="Player 1" oninput="updateNames()">
        <input type="text" id="p2-name-input" class="name-input" placeholder="Player 2" oninput="updateNames()">
    </div>

    <div id="scoreboard">
        <div class="p1-color"><span id="p1-label">Player 1</span>: <span id="p1-score">0</span></div>
        <div class="p2-color"><span id="p2-label">Player 2</span>: <span id="p2-score">0</span></div>
    </div>

    <div id="pool-status-bar">
        <div id="active-pool-indicator">POOL: 🃏 RANDOM</div>
    </div>

    <div id="card">
        <div id="card-text">TYPE YOUR NAMES & HIT START!<br><span style="font-size: 13px; color:#a488e5; font-weight: normal; display:inline-block; margin-top:6px;">You can change Categories anytime in the Settings ⚙️</span></div>
    </div>

    <div id="timer-container">
        <div id="timer-bar"></div>
    </div>
    <div id="timer-text">20.0s</div>

    <div id="turn-indicator"></div>

    <button id="start-btn" class="btn" onclick="startRound()">START</button>

    <div class="game-controls">
        <button id="p1-btn" class="btn player-btn" onclick="passTurn(1)" disabled>
            <span class="btn-name">Player 1</span> <span>Press 'D'</span>
        </button>
        <button id="p2-btn" class="btn player-btn" onclick="passTurn(2)" disabled>
            <span class="btn-name">Player 2</span> <span>Press 'K'</span>
        </button>
    </div>

    <img class="company-logo" src="Assets/JammyLogo.png" alt="Jammy Creatives Logo">
</div>

    let activePool = [];
    let p1Score = 0;
    let p2Score = 0;
    let activePlayer = 0; 
    let maxRoundTime = 20; 
    let timeLeft = 20;
    let timerId = null;
    let gameActive = false;

    let p1Name = "Player 1";
    let p2Name = "Player 2";

    let isMuted = false;
    const countdownAudio = new Audio(BASE_URL + 'countdown.mp3');
    const passAudio = new Audio(BASE_URL + 'pass.mp3');
    const lobbyAudio = new Audio(BASE_URL + 'lobby.mp3');
    lobbyAudio.loop = true;
    const gameplayAudio = new Audio(BASE_URL + 'gameplay.mp3');
    gameplayAudio.loop = true;

    selectCategory('random');
    applyAudioSettings();

    window.addEventListener('click', function initLobbyMusic() {
        if (!gameActive && lobbyAudio.paused && !isMuted) {
            lobbyAudio.play().catch(e => {});
        }
        window.removeEventListener('click', initLobbyMusic);
    });

    // Native Focus Tracking System - Shuts down audio streams immediately on app switch
    document.addEventListener("visibilitychange", function() {
        if (document.hidden) {
            // Tab backgrounded or phone switched to home screen
            lobbyAudio.pause();
            gameplayAudio.pause();
        } else {
            // User entered back into tab
            if (!isMuted) {
                if (gameActive) {
                    gameplayAudio.play().catch(e => {});
                } else {
                    lobbyAudio.play().catch(e => {});
                }
            }
        }
    });

    function toggleSettingsPanel(show) {
        if (gameActive && show) return; 
        document.getElementById('settings-panel').style.display = show ? 'flex' : 'none';
    }

    function toggleInfoPanel(show) {
        document.getElementById('info-panel').style.display = show ? 'flex' : 'none';
    }

    function selectCategory(key) {
        const buttons = document.querySelectorAll('.category-btn');
        buttons.forEach(btn => btn.classList.remove('active-selection'));

        const targetBtn = document.getElementById('cat-' + key);
        if (targetBtn) targetBtn.classList.add('active-selection');

        if (key === 'random') {
            activePool = [];
            for (let type in categories) {
                activePool = activePool.concat(categories[type]);
            }
            document.getElementById('active-pool-indicator').innerText = "POOL: 🃏 RANDOM";
        } else {
            activePool = categories[key];
            let displayTitle = key.replace(/([A-Z])/g, ' $1');
            document.getElementById('active-pool-indicator').innerText = "POOL: " + displayTitle.toUpperCase();
        }
    }

    function applyAudioSettings() {
        const musicVol = document.getElementById('music-volume').value;
        const sfxVol = document.getElementById('sfx-volume').value;

        document.getElementById('music-vol-val').innerText = musicVol + "%";
        document.getElementById('sfx-vol-val').innerText = sfxVol + "%";

        lobbyAudio.volume = musicVol / 100;
        gameplayAudio.volume = musicVol / 100;
        countdownAudio.volume = sfxVol / 100;
        passAudio.volume = sfxVol / 100;
    }

    function updateTimerSettingDisplay() {
        const selectedTime = document.getElementById('timer-length').value;
        document.getElementById('timer-len-val').innerText = selectedTime + "s";
        maxRoundTime = parseInt(selectedTime);
        
        if (!gameActive) {
            document.getElementById('timer-text').innerText = maxRoundTime.toFixed(1) + "s";
        }
    }

    function updateNames() {
        const p1Input = document.getElementById('p1-name-input').value.trim();
        const p2Input = document.getElementById('p2-name-input').value.trim();
        
        p1Name = p1Input !== "" ? p1Input : "Player 1";
        p2Name = p2Input !== "" ? p2Input : "Player 2";

        document.getElementById('p1-label').innerText = p1Name;
        document.getElementById('p2-label').innerText = p2Name;
        
        document.querySelectorAll('.btn-name')[0].innerText = p1Name;
        document.querySelectorAll('.btn-name')[1].innerText = p2Name;

        if (gameActive) updateTurnUI();
    }

    window.addEventListener('keydown', function(e) {
        if (!gameActive) return;
        if (e.key === 'd' || e.key === 'D') passTurn(1);
        if (e.key === 'k' || e.key === 'K') passTurn(2);
    });

    function triggerSubtleImpact(playerNum) {
        const targetBtn = playerNum === 1 ? document.getElementById('p1-btn') : document.getElementById('p2-btn');
        const flashClass = playerNum === 1 ? 'btn-flash-white' : 'btn-flash-purple';
        
        targetBtn.classList.add(flashClass);
        setTimeout(() => {
            targetBtn.classList.remove(flashClass);
        }, 120);

        passAudio.currentTime = 0;
        passAudio.play().catch(e => {});
    }

    function startRound() {
        if (gameActive) return;

        document.getElementById('start-btn').disabled = true;

        lobbyAudio.pause();
        lobbyAudio.currentTime = 0;

        countdownAudio.currentTime = 0;
        countdownAudio.play().catch(e => {});

        let count = 3;
        document.getElementById('card-text').innerText = count;
        
        let countInterval = setInterval(() => {
            count--;
            if (count > 0) {
                document.getElementById('card-text').innerText = count;
            } else if (count === 0) {
                document.getElementById('card-text').innerText = "GO!";
            } else {
                clearInterval(countInterval);
                runGameTimer();
            }
        }, 1000);
    }

    function runGameTimer() {
        if (document.hidden) return; // Prevent loop running if screen backgrounded mid-countdown
        gameplayAudio.currentTime = 0;
        gameplayAudio.play().catch(e => {});

        const randomWord = activePool[Math.floor(Math.random() * activePool.length)];
        document.getElementById('card-text').innerText = randomWord;

        timeLeft = maxRoundTime; 
        document.getElementById('timer-text').innerText = timeLeft.toFixed(1) + "s";
        document.getElementById('timer-bar').style.width = "100%";
        gameActive = true;
        activePlayer = 1;
        updateTurnUI();

        timerId = setInterval(function() {
            // Pause countdown tracking implicitly if tab isn't visible to player
            if (document.hidden) return;

            timeLeft -= 0.1;
            if (timeLeft <= 0) {
                timeLeft = 0;
                endRound();
            }
            document.getElementById('timer-text').innerText = timeLeft.toFixed(1) + "s";
            document.getElementById('timer-bar').style.width = (timeLeft / maxRoundTime * 100) + "%";
        }, 100);
    }

    function passTurn(playerNum) {
        if (!gameActive || activePlayer !== playerNum) return;
        
        triggerSubtleImpact(playerNum);

        activePlayer = (activePlayer === 1) ? 2 : 1;
        updateTurnUI();
    }

    function updateTurnUI() {
        const p1Btn = document.getElementById('p1-btn');
        const p2Btn = document.getElementById('p2-btn');
        const indicator = document.getElementById('turn-indicator');
        if (activePlayer === 1) {
            p1Btn.disabled = false;
            p2Btn.disabled = true;
            indicator.innerHTML = `◀ ${p1Name}'s Turn!`;
        } else {
            p1Btn.disabled = true;
            p2Btn.disabled = false;
            indicator.innerHTML = `${p2Name}'s Turn! ▶`;
        }
    }

    function endRound() {
        gameActive = false;
        clearInterval(timerId);
        
        gameplayAudio.pause();
        gameplayAudio.currentTime = 0;
        if (!isMuted && !document.hidden) lobbyAudio.play().catch(e => {});

        document.getElementById('p1-btn').disabled = true;
        document.getElementById('p2-btn').disabled = true;
        document.getElementById('start-btn').disabled = false;

        if (activePlayer === 1) {
            p2Score++;
            document.getElementById('p2-score').innerText = p2Score;
            document.getElementById('card-text').innerText = `Unlucky, ${p1Name}. ${p2Name} wins this time.`;
        } else {
            p1Score++;
            document.getElementById('p1-score').innerText = p1Score;
            document.getElementById('card-text').innerText = `Sucks to suck ${p2Name}. ${p1Name} won the round.`;
        }
        document.getElementById('turn-indicator').innerText = "";
    }
</script>
